kind = "web"
previewPath = "/__dev-frontend"
title = "University Scheduling System"
version = "1.0.0"
id = "artifacts/university-scheduler"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 5000
name = "web"
paths = ["/__dev-frontend"]

[services.development]
run = "pnpm --filter @workspace/university-scheduler run dev"

[services.env]
PORT = "5000"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/university-scheduler", "run", "build"]
publicDir = "frontend/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
